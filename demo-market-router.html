<title>MARKET ROUTER — demo (EAN → Europe)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg0:#0A0B0E; --bg1:#14161D; --bg2:#20232C; --line:#2A2E3A;
    --ink:#EDEAE0; --ink2:#E7DCC2; --mut:#8b8e99;
    --amber:#FFB020; --teal:#2FE3C6; --coral:#FF6B6B; --green:#4ADE80;
    --fm:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;
    --fc:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg0);color:var(--ink);font-family:var(--fm);overflow:hidden}
  .stage{position:fixed;inset:0;background:
    radial-gradient(130% 100% at 50% -20%, #181b22 0%, var(--bg0) 60%);
    overflow:hidden}

  /* persistent chrome */
  .brand{position:absolute;top:3.2vh;left:3.4vw;z-index:40;font-family:var(--fc);
    letter-spacing:.34em;font-size:1.35vh;color:var(--ink2)}
  .brand b{color:var(--amber);font-weight:600}
  .verbs{position:absolute;top:3.2vh;right:3.4vw;z-index:40;font-family:var(--fc);
    font-size:1.25vh;letter-spacing:.28em;color:var(--mut)}
  .verbs .on{color:var(--teal)}
  .caption{position:absolute;bottom:3.4vh;left:0;right:0;text-align:center;z-index:40;
    font-family:var(--fc);font-size:1.5vh;letter-spacing:.22em;color:var(--mut);
    text-transform:uppercase;opacity:0;transition:opacity .5s}
  .caption.show{opacity:1}

  /* ===== SCENE: PRODUCT ===== */
  .scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .7s ease;pointer-events:none}
  .scene.show{opacity:1}
  .prodwrap{display:flex;align-items:center;gap:5vw;transform:translateY(1.5vh) scale(.96);
    transition:transform .8s cubic-bezier(.2,.8,.2,1),opacity .6s}
  .scene.show .prodwrap{transform:translateY(0) scale(1)}

  /* real product photo, framed + veiled to sit on dark ground */
  .product{position:relative;width:34vh;height:26vh;display:flex;align-items:center;justify-content:center;
    filter:drop-shadow(0 3vh 5vh rgba(0,0,0,.6))}
  .product .halo{position:absolute;inset:-6%;border-radius:2.4vh;
    background:radial-gradient(60% 60% at 50% 60%,rgba(255,176,32,.20),transparent 66%);filter:blur(8px)}
  .pframe{position:relative;width:100%;height:100%;border-radius:1.8vh;overflow:hidden;
    border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
  .pframe img{width:100%;height:100%;object-fit:cover;object-position:66% 50%;
    filter:contrast(1.04) saturate(1.02) brightness(.98)}
  .pveil{position:absolute;inset:0;pointer-events:none;background:
    radial-gradient(120% 90% at 50% 40%, transparent 40%, rgba(10,11,14,.55) 100%),
    linear-gradient(180deg, rgba(10,11,14,.25), rgba(10,11,14,.05) 30%, rgba(10,11,14,.55));
    mix-blend-mode:multiply}
  .pframe::after{content:"";position:absolute;inset:0;border-radius:1.8vh;
    box-shadow:inset 0 0 6vh rgba(10,11,14,.7);pointer-events:none}

  .prodinfo{width:34vw;max-width:520px}
  .ean{font-family:var(--fc);font-size:1.8vh;letter-spacing:.14em;color:var(--teal)}
  .ean .cur{border-right:2px solid var(--teal);animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{border-color:transparent}}
  .pname{font-size:4.4vh;font-weight:600;letter-spacing:.01em;margin:.5vh 0 2.4vh;line-height:1.05}
  .cart{border:1px solid var(--line);border-radius:1.4vh;background:linear-gradient(180deg,var(--bg1),var(--bg0));
    padding:2.4vh 2.6vh;opacity:0;transform:translateX(2vw);transition:opacity .6s,transform .6s}
  .cart.in{opacity:1;transform:none}
  .cart .row{display:flex;justify-content:space-between;align-items:baseline}
  .cart .row+.row{margin-top:1.6vh;padding-top:1.6vh;border-top:1px solid var(--line)}
  .cart .k{font-family:var(--fc);font-size:1.5vh;letter-spacing:.14em;color:var(--mut);text-transform:uppercase}
  .cart .v{font-size:3.4vh;font-weight:600;font-variant-numeric:tabular-nums}
  .cart .v.price{color:var(--amber)}
  .cart .v.units{color:var(--ink)}

  /* route arrow shooting from product to right */
  .shot{position:absolute;top:50%;left:50%;height:2px;width:0;background:
    linear-gradient(90deg,transparent,var(--amber));box-shadow:0 0 2vh var(--amber);
    opacity:0;z-index:30}
  .shot.go{animation:shoot 1s cubic-bezier(.5,0,.2,1) forwards}
  @keyframes shoot{0%{opacity:1;width:0}70%{opacity:1;width:60vw}100%{opacity:0;width:70vw}}

  /* ===== SCENE: MAP ===== */
  .mapscene{}
  .mapzoom{position:absolute;inset:0;transform-origin:50% 50%;
    transition:transform 1.4s cubic-bezier(.5,0,.2,1)}
  svg.euoutline{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .euoutline path{fill:rgba(255,255,255,.025);stroke:rgba(141,142,153,.32);stroke-width:.16;
    vector-effect:non-scaling-stroke;transition:fill .5s,stroke .5s}
  .euoutline path.hot{fill:rgba(47,227,198,.15);stroke:var(--teal);stroke-width:.45}
  svg.routes{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .node{position:absolute;transform:translate(-50%,-50%);text-align:center;z-index:5}
  .node .dot{width:1.5vh;height:1.5vh;border-radius:50%;background:var(--mut);margin:0 auto;
    box-shadow:0 0 0 0 rgba(47,227,198,0);transition:all .5s}
  .node .lab{font-family:var(--fc);font-size:1.3vh;letter-spacing:.12em;color:var(--mut);margin-top:.7vh;transition:color .4s}
  .node.home .dot{background:var(--amber);box-shadow:0 0 2vh var(--amber)}
  .node.home .lab{color:var(--ink2)}
  .node.active .dot{background:var(--teal);box-shadow:0 0 0 .5vh rgba(47,227,198,.18),0 0 2.6vh var(--teal);
    width:2vh;height:2vh}
  .node.active .lab{color:var(--teal)}
  .node.lit .dot{background:var(--ink2)}
  .node.lit .lab{color:var(--ink2)}

  /* data card for a country */
  .dcard{position:absolute;z-index:20;width:30vh;border:1px solid var(--line);border-radius:1.4vh;
    background:linear-gradient(180deg,rgba(24,27,34,.94),rgba(10,11,14,.94));backdrop-filter:blur(6px);
    padding:2.2vh 2.4vh;opacity:0;transform:translateY(1.4vh) scale(.97);
    transition:opacity .45s,transform .45s;box-shadow:0 3vh 6vh rgba(0,0,0,.55)}
  .dcard.in{opacity:1;transform:none}
  .dcard .flag{font-family:var(--fc);font-size:1.5vh;letter-spacing:.2em;color:var(--teal);text-transform:uppercase}
  .dcard h3{font-size:3vh;font-weight:600;margin:.3vh 0 1.6vh}
  .dcard .dr{display:flex;justify-content:space-between;align-items:baseline;margin-top:1vh;
    font-variant-numeric:tabular-nums}
  .dcard .dk{font-family:var(--fc);font-size:1.4vh;color:var(--mut);letter-spacing:.08em}
  .dcard .dv{font-size:2vh;font-weight:600}
  .dcard .stars{color:var(--amber);letter-spacing:.15em;font-size:2vh}
  .dcard .stars .off{color:#41454f}
  .dcard .rec{margin-top:1.8vh;padding-top:1.4vh;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center}

  /* ===== SCENE: OUTRO ===== */
  .outro{flex-direction:column;gap:2vh;text-align:center}
  .outro .ring{position:absolute;width:34vh;height:34vh;border-radius:50%;
    border:2px solid transparent;border-top-color:var(--amber);border-right-color:var(--teal);
    opacity:0;transition:opacity .6s;animation:spin 6s linear infinite}
  .outro.show .ring{opacity:.85}
  @keyframes spin{to{transform:rotate(360deg)}}
  .outro .tag{font-family:var(--fc);letter-spacing:.34em;color:var(--teal);font-size:1.8vh;
    text-transform:uppercase;opacity:0;transition:opacity .6s .3s}
  .outro.show .tag{opacity:1}
  .outro h2{font-size:6vh;font-weight:600;letter-spacing:.01em;opacity:0;transform:translateY(1.4vh);
    transition:opacity .7s .5s,transform .7s .5s}
  .outro.show h2{opacity:1;transform:none}
  .outro h2 b{color:var(--amber);font-weight:600}
  .outro .verbline{font-family:var(--fc);letter-spacing:.3em;color:var(--mut);font-size:1.7vh;
    opacity:0;transition:opacity .7s .8s}
  .outro.show .verbline{opacity:1}

  /* ===== persistent top bar ===== */
  .topbar{position:absolute;top:6.6vh;left:0;right:0;z-index:60;display:flex;align-items:center;gap:2vw;
    padding:1.2vh 3.4vw;transform:translateY(-170%);transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .topbar.in{transform:none}
  .tb-buy{display:flex;flex-direction:column;line-height:1.05;flex:0 0 auto}
  .tb-buy .tbk{font-family:var(--fc);font-size:1.15vh;letter-spacing:.18em;color:var(--mut);text-transform:uppercase}
  .tb-buy .tbv{font-size:2.9vh;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums}
  .tb-status{display:flex;align-items:center;gap:.7vw;font-family:var(--fc);font-size:1.3vh;letter-spacing:.14em;color:var(--teal);text-transform:uppercase;flex:0 0 auto}
  .anaicon{width:1.5vh;height:1.5vh;border:2px solid rgba(47,227,198,.3);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite}
  .topbar.done .anaicon{animation:none;border-color:var(--green);border-top-color:var(--green)}
  .topbar.done .tb-status{color:var(--green)}
  .tb-chips{display:flex;gap:.6vw;flex-wrap:wrap;flex:1;justify-content:flex-end;align-items:center}
  .chip{font-family:var(--fc);font-size:1.15vh;letter-spacing:.04em;padding:.55vh 1.1vh;border-radius:99px;
    border:1px solid var(--line);color:var(--ink2);background:rgba(20,22,29,.72);white-space:nowrap;
    opacity:0;transform:translateY(-.6vh);transition:opacity .35s,transform .35s}
  .chip.in{opacity:1;transform:none}
  .chip .ok{color:var(--green);margin-left:.5vh}

  /* ===== final expand list ===== */
  .expand{position:absolute;left:50%;top:50%;transform:translate(-50%,-45%) scale(.96);z-index:70;
    width:min(80vw,800px);max-height:84vh;overflow:auto;padding:3vh 3.2vh;
    background:linear-gradient(180deg,rgba(20,22,29,.98),rgba(10,11,14,.98));
    border:1px solid var(--line);border-radius:1.8vh;box-shadow:0 4vh 9vh rgba(0,0,0,.6);
    opacity:0;pointer-events:none;transition:opacity .6s,transform .6s}
  .expand.in{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .expand .eh{font-family:var(--fc);letter-spacing:.16em;font-size:1.5vh;color:var(--teal);text-transform:uppercase}
  .expand .buyref{font-size:2vh;color:var(--mut);margin:.5vh 0 2.2vh}
  .expand .buyref b{color:var(--amber)}
  .erow{display:grid;grid-template-columns:1.6fr 1fr 1fr 1.1fr;gap:1.4vw;align-items:center;
    padding:1.25vh 1.4vh;border-radius:1vh;border:1px solid transparent}
  .erow+.erow{margin-top:.5vh}
  .erow.head{color:var(--mut);font-family:var(--fc);font-size:1.15vh;letter-spacing:.1em;text-transform:uppercase;padding:.2vh 1.4vh}
  .erow .mp{font-weight:600;font-size:2vh}
  .erow .pr{font-variant-numeric:tabular-nums;font-size:2vh;color:var(--ink)}
  .erow .mg{color:var(--green);font-variant-numeric:tabular-nums;font-size:2vh}
  .erow .st{color:var(--amber);letter-spacing:.1em;font-size:1.9vh}
  .erow .st .off{color:#41454f}
  .erow.best{border-color:rgba(47,227,198,.5);background:rgba(47,227,198,.08)}
  .erow.best .mp{color:var(--teal)}
  .ebadge{font-family:var(--fc);font-size:1.05vh;letter-spacing:.1em;color:var(--teal);margin-left:.6vw}

  /* marketplace transient card extras */
  .dcard .mtag{display:inline-block;font-family:var(--fc);font-size:1.2vh;letter-spacing:.14em;color:var(--teal);
    border:1px solid rgba(47,227,198,.4);border-radius:99px;padding:.3vh 1vh;margin:.2vh 0 1.3vh}
  .dcard .dv.price{color:var(--amber)} .dcard .dv.gain{color:var(--green)}

  @media (prefers-reduced-motion: reduce){
    .outro .ring{animation:none}.ean .cur{animation:none}.anaicon{animation:none}
  }
</style>

<div class="stage" id="stage">
  <div class="brand">MARKET <b>ROUTER</b></div>
  <div class="verbs" id="verbs"><span data-v="LAUNCH">LAUNCH</span> · <span data-v="SELL">SELL</span> · <span data-v="RESELL">RESELL</span></div>

  <!-- persistent top bar: frozen buy price + analysis + accumulating chips -->
  <div class="topbar" id="topbar">
    <div class="tb-buy"><span class="tbk">Buy price</span><span class="tbv" id="tbBuy">—</span></div>
    <div class="tb-status" id="tbStatus"><span class="anaicon"></span><span id="anaTxt">Analizuję rynki UE…</span></div>
    <div class="tb-chips" id="tbChips"></div>
  </div>
  <!-- final reveal: full ranked price list -->
  <div class="expand" id="expand"></div>

  <!-- PRODUCT -->

const SVGNS = "http://www.w3.org/2000/svg";

const PRODUCT = { ean:"6925281993176", name:"JBL · TWS Earbuds", price:"179,00 zł", units:240 };

const HOME = { code:"PL", label:"PL · HUB", fx:.615, fy:.40 };

// cena zakupu — zamrożona na górnej belce przez całą animację
const BUY = { price:"179,00 zł" };
// marketplace'y skanowane po kolei (chip po każdym). code = kraj na mapie.
const MARKETS = [
  { mp:"amazon.de",    code:"DE", price:"€ 39,90",   margin:"+38%", stars:5, tag:"BUY BOX" },
  { mp:"amazon.co.uk", code:"GB", price:"£ 34,90",   margin:"+29%", stars:4, tag:"BUY BOX" },
  { mp:"allegro.pl",   code:"PL", price:"199,00 zł", margin:"+11%", stars:3, tag:"TOP OFERTA" },
  { mp:"amazon.fr",    code:"FR", price:"€ 38,90",   margin:"+35%", stars:4, tag:"BUY BOX" },
  { mp:"amazon.it",    code:"IT", price:"€ 37,90",   margin:"+33%", stars:3, tag:"BUY BOX" },
  { mp:"amazon.es",    code:"ES", price:"€ 36,90",   margin:"+30%", stars:3, tag:"—" },
];
// faint context nodes (bez kart) — tekstura sieci
const CONTEXT = [
  {code:"NL"},{code:"SK"},{code:"GR"},{code:"LT"},{code:"SE"},
  {code:"CZ"},{code:"AT"},{code:"BE"},{code:"PT"},{code:"RO"},{code:"DK"},
];
// override hand-placed coords with real projected centroids from geojson
[HOME, ...MARKETS, ...CONTEXT].forEach(o=>{ const c=EU_MAP.cent[o.code]; if(c){ o.fx=c[0]; o.fy=c[1]; } });

/* ---------- build map nodes + routes ---------- */
const nodesEl = document.getElementById('nodes');
const routesEl = document.getElementById('routes');
const outEl = document.getElementById('euoutline');
// real Europe outline (per-country, so we can highlight a country's landmass)
for(const code in EU_MAP.paths){
  const p=document.createElementNS(SVGNS,'path');
  p.setAttribute('d',EU_MAP.paths[code]); p.setAttribute('data-code',code);
  outEl.appendChild(p);
}
function hot(code,on){ const p=outEl.querySelector('path[data-code="'+code+'"]'); if(p) p.classList.toggle('hot',!!on); }
const nodeMap = {};
function addNode(c, cls){
  const n=document.createElement('div');
  n.className='node '+(cls||'');
  n.style.left=(c.fx*100)+'%'; n.style.top=(c.fy*100)+'%';
  n.innerHTML=`<div class="dot"></div><div class="lab">${c.code}</div>`;
  nodesEl.appendChild(n); nodeMap[c.code+(cls==='home'?'_home':'')]=n; return n;
}
CONTEXT.forEach(c=>{ if(c.fx!=null) addNode(c,'ctx'); });
MARKETS.forEach(m=>{ if(m.code!=='PL') addNode(m); });
const homeNode = addNode(HOME,'home');
// routes home -> each market (drawn later)
const routeLines={};
MARKETS.forEach(m=>{
  if(m.code==='PL') return;
  const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('x1',HOME.fx*100); ln.setAttribute('y1',HOME.fy*100);
  ln.setAttribute('x2',m.fx*100); ln.setAttribute('y2',m.fy*100);
  ln.setAttribute('stroke','url(#rg)'); ln.setAttribute('stroke-width','.35');
  ln.setAttribute('vector-effect','non-scaling-stroke');
  ln.style.strokeDasharray='40'; ln.style.strokeDashoffset='40';
  ln.style.transition='stroke-dashoffset 1s ease, opacity .6s'; ln.style.opacity='0';
  routesEl.appendChild(ln); routeLines[m.code]=ln;
});
routesEl.insertAdjacentHTML('afterbegin',
  '<defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="0">'+
  '<stop offset="0" stop-color="#FFB020"/><stop offset="1" stop-color="#2FE3C6"/>'+
  '</linearGradient></defs>');

/* ---------- helpers ---------- */
const $=id=>document.getElementById(id);
function show(id,on){ $(id).classList.toggle('show',on); }
function cap(t){ const c=$('cap'); if(t){c.textContent=t;c.classList.add('show');} else c.classList.remove('show'); }
function verb(v){ $('verbs').querySelectorAll('span').forEach(s=>s.classList.toggle('on',s.dataset.v===v)); }
function zoom(fx,fy,k){ $('mapzoom').style.transformOrigin=(fx*100)+'% '+(fy*100)+'%';
  $('mapzoom').style.transform=`translate(${(0.5-fx)*100}%, ${(0.5-fy)*100}%) scale(${k})`; }
function zoomReset(){ $('mapzoom').style.transform='none'; }
function typeEAN(txt,done){ const el=$('eanText'); el.textContent='EAN '; let i=0;
  const iv=setInterval(()=>{ el.textContent='EAN '+txt.slice(0,++i); if(i>=txt.length){clearInterval(iv);done&&done();} },55); }
function count(el,from,to,dur){ const t0=performance.now();
  (function step(t){ const p=Math.min(1,(t-t0)/dur); const e=1-Math.pow(1-p,3);
    el.textContent=Math.round(from+(to-from)*e).toLocaleString('pl-PL');
    if(p<1)requestAnimationFrame(step); })(t0); }
function stars(n){ let s=''; for(let i=0;i<5;i++) s+= i<n?'★':'<span class="off">★</span>'; return s; }

function mpcard(m){
  const c=$('dcard');
  c.innerHTML =
    `<div class="flag">${m.mp}</div>`+
    `<div class="mtag">${m.tag}</div>`+
    `<div class="dr"><span class="dk">Cena rynkowa</span><span class="dv price">${m.price}</span></div>`+
    `<div class="dr"><span class="dk">Marża vs zakup</span><span class="dv gain">${m.margin}</span></div>`+
    `<div class="rec"><span class="dk">Rekomendacja</span><span class="stars">${stars(m.stars)}</span></div>`;
  c.style.left = m.fx<0.5 ? '56%' : '9%';
  c.style.right='auto';
  c.style.top = m.fy<0.5 ? '48%' : '22%';
}
function addChip(m){
  const el=document.createElement('div'); el.className='chip';
  el.innerHTML=m.mp+' <span class="ok">✓</span>';
  $('tbChips').appendChild(el); requestAnimationFrame(()=>el.classList.add('in'));
}
function buildExpand(){
  const ranked=[...MARKETS].sort((a,b)=> b.stars-a.stars || (parseFloat(b.margin)-parseFloat(a.margin)));
  let rows='<div class="erow head"><span>Kanał</span><span>Cena</span><span>Marża</span><span>Rekomendacja</span></div>';
  ranked.forEach((m,i)=>{ rows+=`<div class="erow${i===0?' best':''}">`+
    `<span class="mp">${m.mp}${i===0?'<span class="ebadge">★ REKOMENDACJA</span>':''}</span>`+
    `<span class="pr">${m.price}</span><span class="mg">${m.margin}</span>`+
    `<span class="st">${stars(m.stars)}</span></div>`; });
  $('expand').innerHTML=`<div class="eh">From EAN to Europe · ${MARKETS.length} rynków</div>`+
    `<div class="buyref">Cena zakupu <b>${BUY.price}</b> → najlepsza trasa na rynek</div>`+rows;
}

/* ============================================================
   TIMELINE
   ============================================================ */
let timers=[];
function at(ms,fn){ timers.push(setTimeout(fn,ms)); }
function clearAll(){ timers.forEach(clearTimeout); timers=[]; }

function run(){
  clearAll();
  // reset
  ['s-prod','s-map','s-out'].forEach(x=>show(x,false));
  $('cart').classList.remove('in'); $('dcard').classList.remove('in');
  $('shot').className='shot'; zoomReset(); cap(''); verb('');
  $('price').textContent='—'; $('units').textContent='0'; $('eanText').textContent='';
  Object.values(routeLines).forEach(l=>{l.style.strokeDashoffset='40';l.style.opacity='0';});
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('active','lit'));
  document.querySelectorAll('.euoutline path').forEach(p=>p.classList.remove('hot'));
  $('topbar').classList.remove('in','done'); $('tbBuy').textContent='—';
  $('tbChips').innerHTML=''; $('anaTxt').textContent='Analizuję rynki UE…';
  $('expand').classList.remove('in'); $('expand').innerHTML='';

  // --- SCENE 1: PRODUCT + cena zakupu ---
  at(300,()=>{ show('s-prod',true); verb('LAUNCH'); cap('Przynieś EAN'); });
  at(800,()=> typeEAN(PRODUCT.ean));
  at(900,()=> $('pname').textContent=PRODUCT.name );
  at(1900,()=>{ $('cart').classList.add('in'); $('price').textContent=BUY.price;
    count($('units'),0,PRODUCT.units,1300); cap('Cena zakupu · stan'); });

  // cena zakupu zamraża się na górnej belce → start analizy
  at(3700,()=>{ $('tbBuy').textContent=BUY.price; $('topbar').classList.add('in'); $('shot').classList.add('go'); });
  at(4300,()=>{ show('s-prod',false); show('s-map',true); verb('SELL');
    cap('Skanuję marketplace UE'); homeNode.classList.add('active'); });

  // --- SCENE 2: skan marketplace'ów, chipy doklejają się ---
  const base=5500, dt=2600;
  MARKETS.forEach((m,i)=>{
    const t=base+i*dt;
    at(t,()=>{ zoom(m.fx,m.fy, m.code==='DE'?2.15:2.35);
      const nd=nodeMap[m.code]||homeNode; nd.classList.add('active'); hot(m.code,true);
      if(routeLines[m.code]){routeLines[m.code].style.opacity='1';routeLines[m.code].style.strokeDashoffset='0';}
      cap(m.mp); });
    at(t+550,()=>{ mpcard(m); $('dcard').classList.add('in'); });
    at(t+950,()=> addChip(m));
    at(t+2150,()=>{ $('dcard').classList.remove('in');
      const nd=nodeMap[m.code]||homeNode; nd.classList.remove('active'); nd.classList.add('lit'); });
  });

  // --- SCENE 3: oddalenie, wszystko świeci, analiza gotowa ---
  const outT=base+MARKETS.length*dt+300;
  at(outT,()=>{ zoomReset(); cap('');
    Object.values(routeLines).forEach(l=>{l.style.opacity='1';l.style.strokeDashoffset='0';});
    document.querySelectorAll('.node').forEach(n=>{ if(!n.classList.contains('home')) n.classList.add('lit'); });
    $('topbar').classList.add('done'); $('anaTxt').textContent=MARKETS.length+' rynków · analiza gotowa'; verb('RESELL'); });

  // --- SCENE 4: rozwinięcie przypiętej belki → pełna lista ---
  at(outT+1200,()=>{ buildExpand(); $('expand').classList.add('in'); });

  // loop
  at(outT+8000, run);
}
window.addEventListener('load',()=> setTimeout(run,400));
window.addEventListener('keydown',e=>{ if(e.key==='r'||e.key==='R') run(); });
</script>
